version: 1
$id: "https://lean-meta-library.local/config/repo-structure.config.yaml"
title: "Lean Meta Library import submission structure"
description: >
  Self-contained description of the expected file layout for a source
  repository submitted to the Lean Meta Library import workflow. The structure
  is rooted at the directory containing the submission metadata file.

root:
  role: import-submission-root
  description: "Directory containing the submission metadata file."
  files:
    metadata:
      fileName: meta.yaml
      required: true
      mayAlsoBeNamed:
        - meta.yml
      schema: meta.config.yaml
      description: >
        Submission metadata. The import workflow may receive a different
        repository-relative metadata path, but the default root metadata file is
        meta.yaml.

    abstract:
      pathFromMetadata: abstractPath
      required: true
      description: "Short TeX abstract for the submission."
      expectedContent:
        - "Paper-facing summary of the submission's results."
        - "Local repository file, not a generated GitHub source URL."

  folders:
    statementFolder:
      requiredWhenMetadataHas:
        - statementLakefilePath
        - statements
      folderPath: "dirname(statementLakefilePath)"
      description: >
        Statement package folder. This package publishes public Definition and
        Axiom entries for the submission.
      files:
        lakefile:
          pathFromMetadata: statementLakefilePath
          required: true
          description: "Lake file for the statement package."
          expectedContent:
            - "Defines the statement-side Lake package or library."
            - "Builds every statement Lean file listed in metadata."
            - "Includes all listed statement files in one shared statement library."

      declarationFolders:
        arrayFromMetadata: statements
        folderPath: "dirname(statements[].Statement.LeanStatement)"
        description: >
          One folder per public Definition or Axiom entry. The Lean and LaTeX
          files for the same statement entry should be in this folder.
        files:
          leanFile:
            pathFromMetadata: statements[].Statement.LeanStatement
            required: true
            description: "Lean file containing the public statement declaration."
            expectedContent:
              - "For Type: Definition, introduces the metadata declaration as one Lean def."
              - "For Type: Axiom, introduces the metadata declaration as one Lean axiom."
              - "Axiom entries must not be theorem declarations."
              - "Statement files should not introduce extra public declarations beyond the metadata-listed declaration."
              - "Imports should be limited to Mathlib modules, Std modules, local statement modules, and authorized imported packages."

          latexFile:
            pathFromMetadata: statements[].Statement.LatexDefinition
            required: true
            description: "LaTeX file explaining the public statement declaration."
            expectedContent:
              - "Paper-facing definition or statement text for the matching Lean declaration."

    proofFolder:
      requiredWhenMetadataHas:
        - proofLakefilePath
        - proofs
      folderPath: "dirname(proofLakefilePath)"
      description: >
        Proof package folder. This package contains proof, conditional-proof,
        or reduction declarations that discharge Axiom entries.
      files:
        lakefile:
          pathFromMetadata: proofLakefilePath
          required: true
          description: "Lake file for the proof package."
          expectedContent:
            - "Defines the proof-side Lake package or library."
            - "Builds every proof Lean file listed in metadata."
            - "May depend locally on a present statement package, but that split is not required."

      proofFiles:
        arrayFromMetadata: proofs
        pathFromMetadata: proofs[].Proof.File
        required: true
        description: "Lean proof file containing the proof declaration named by proofs[].Proof.Name."
        expectedContent:
          - "Contains a theorem or declaration whose name is proofs[].Proof.Name."
          - "The proof declaration's type must be definitionally equal to proofs[].Theorem.Name."
          - "The proof entry Type is proof, conditional-proof, or reduction."
          - "Submitted proof targets must not depend on sorryAx or local proof-namespace axioms."
          - "Imports should be limited to Mathlib modules, Std modules, local submission modules, and authorized imported packages."

relationships:
  metadataControlsLayout:
    - "The metadata file is the source of all non-default repository-relative paths."
    - "abstractPath locates the abstract file from the root."
    - "statementLakefilePath locates the statement folder lakefile from the root."
    - "proofLakefilePath locates the proof folder lakefile from the root."
    - "Each statements[].Statement.LeanStatement locates one statement Lean file from the root."
    - "Each statements[].Statement.LatexDefinition locates the matching statement LaTeX file from the root."
    - "Each proofs[].Proof.File locates one proof Lean file from the root."
  statementEntries:
    - "Each statement entry has Type Definition or Axiom."
    - "Definition entries publish definitions."
    - "Axiom entries publish statement axioms."
    - "Statement Lean and LaTeX files for the same entry should share a folder."
  proofEntries:
    - "Each proof entry targets an Axiom statement through proofs[].Theorem."
    - "proof and conditional-proof entries classify the target statement as a theorem."
    - "reduction entries classify the target statement as a conjecture."
  declarationReferences:
    - "DeclarationReferences use CurrentSubmission or SubmissionSlug, plus LeanStatement, LatexDefinition, and Name."
    - "Referenced LeanStatement and LatexDefinition files should be in the same folder."
    - "Proof-level DeclarationReferences are supported independently of statement-level DeclarationReferences."
    - "Declared dependencies must include actual Lean axiom dependencies found in proof terms."

filePolicy:
  appliesTo: whole-repository-subtree-below-metadata-file
  allowedExtensionsFrom: "lml-env.json#/submission/allowedFileExtensions"
  allowedExtensionlessFilesFrom: "lml-env.json#/submission/allowedExtensionlessFiles"
  disallowedFiles:
    - .DS_Store
  ignoredDirectories:
    - .git
    - .lake
    - node_modules

buildAndCheckPolicy:
  packagePreparation:
    - "Prepare and build only packages that are present according to metadata."
    - "Lake update and build failures reject the submission."
    - "Cache fetch is best-effort and may warn without rejecting the submission."
  firstRunChecks:
    - "Validate metadata against meta.config.yaml before repository-aware checks."
    - "Check that every metadata-listed repository-local file exists."
    - "Check that statement package files match metadata exactly."
    - "Check allowed file extensions and extensionless filenames from lml-env.json."
    - "Check Lean imports against the allowed import and declared dependency policy."
    - "Check statement declarations with Lean inspection."
    - "Check proof declarations, definitional equality, axioms, and sorry usage with Lean inspection."
  finalProofBuildTarget:
    - "Copy the metadata-root package tree into isolation."
    - "Run lake update, lake clean, best-effort cache fetch, and lake build."
    - "Reject build output that reports sorry or sorryAx."
    - "Compose submitted proof targets using metadata DeclarationReferences."
    - "Accepted composed proofs bottom out only in allowed base axioms and declared conjectures."
    - "Remaining target work: recursively follow imported submission metadata, rewrite proved dependency statements to proof counterparts, and compare computed dependency/conjecture information to metadata."
