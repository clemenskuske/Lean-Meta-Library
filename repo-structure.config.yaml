version: 1
$id: "https://lean-meta-library.local/config/repo-structure.config.yaml"
title: "Lean Meta Library import repository structure"
description: >
  Declarative first version of the repository-structure contract for a source
  repository submitted to the Lean Meta Library import workflow. Metadata shape
  is still defined by meta.config.yaml; this file records the repository files,
  package presence rules, and content expectations that checkers should enforce
  around that metadata.

sourcesOfTruth:
  metadataSchema: meta.config.yaml
  environmentPolicy: lml-env.json
  metadataDefaultPath: "lml-env.json#/submission/defaultMetadataPath"
  allowedFileExtensions: "lml-env.json#/submission/allowedFileExtensions"
  allowedExtensionlessFiles: "lml-env.json#/submission/allowedExtensionlessFiles"
  allowedDirectImportPrefixes: "lml-env.json#/submission/allowedImportPrefixes"

repository:
  kind: source-repository
  metadataFile:
    defaultPath: meta.yaml
    acceptedExtensions:
      - .yaml
      - .yml
    pathRule: repo-relative-file
    schemaFrom: meta.config.yaml
  abstractFile:
    pathFrom: abstractPath
    required: true
    pathRule: repo-relative-file
    expectedContent:
      - "Short TeX abstract for the submission."
      - "Stored as repository-local content, not as a generated GitHub source URL."
  rootFilePolicy:
    appliesTo: whole-repository-subtree-below-metadata-file
    allowedExtensionsFrom: "lml-env.json#/submission/allowedFileExtensions"
    allowedExtensionlessFilesFrom: "lml-env.json#/submission/allowedExtensionlessFiles"
    disallowedFiles:
      - .DS_Store
    ignoredDirectories:
      - .git
      - .lake
      - node_modules

metadataPathFields:
  statementLakefilePath:
    role: statement-package-lakefile
    pathRule: repo-relative-file
  proofLakefilePath:
    role: proof-package-lakefile
    pathRule: repo-relative-file
  abstractPath:
    role: submission-abstract
    pathRule: repo-relative-file
  statements[].Statement.LeanStatement:
    role: public-statement-lean-file
    pathRule: repo-relative-file
  statements[].Statement.LatexDefinition:
    role: public-statement-latex-file
    pathRule: repo-relative-file
  statements[].DeclarationReferences[].LeanStatement:
    role: referenced-statement-lean-file
    pathRule: repo-relative-file-within-referenced-submission
  statements[].DeclarationReferences[].LatexDefinition:
    role: referenced-statement-latex-file
    pathRule: repo-relative-file-within-referenced-submission
  proofs[].Theorem.File:
    role: theorem-target-statement-file
    pathRule: repo-relative-file-within-theorem-submission
  proofs[].Proof.File:
    role: proof-lean-file
    pathRule: repo-relative-file
  proofs[].DeclarationReferences[].LeanStatement:
    role: proof-referenced-statement-lean-file
    pathRule: repo-relative-file-within-referenced-submission
  proofs[].DeclarationReferences[].LatexDefinition:
    role: proof-referenced-statement-latex-file
    pathRule: repo-relative-file-within-referenced-submission

packages:
  statementPackage:
    terminology: statement-package
    presentWhen:
      anyMetadataFieldPresent:
        - statementLakefilePath
        - statements
    packageRoot: "dirname(statementLakefilePath)"
    lakefilePathFrom: statementLakefilePath
    requiredWhenPresent:
      - pathFrom: statementLakefilePath
        kind: file
      - pathFrom: "statements[].Statement.LeanStatement"
        kind: file
      - pathFrom: "statements[].Statement.LatexDefinition"
        kind: file
    optionalWhenPresent:
      - path: lean-toolchain
        relativeTo: packageRoot
      - path: lake-manifest.json
        relativeTo: packageRoot
    expectedContent:
      lakefile.lean:
        - "Defines the statement-side Lake package/library for this submission."
        - "Pins mathlib to lml-env.json mathlib.revision when declaring mathlib."
        - "Includes every Lean statement file listed in metadata in the shared statement library."
      lean-toolchain:
        - "If present, contains exactly the Lean toolchain from lml-env.json lean.toolchain."
      statementLeanFiles:
        - "Each Definition entry introduces the metadata declaration as a Lean def."
        - "Each Axiom entry introduces the metadata declaration as a Lean axiom."
        - "Axiom statement files must not introduce theorem declarations as submitted statement content."
        - "Statement content must not introduce extra public declarations beyond the metadata-listed declaration and its declared references."
        - "Direct imports may use Mathlib modules, Std modules, local statement modules, and authorized imported packages only."
      statementLatexFiles:
        - "Each metadata statement has a matching LaTeX definition file."
        - "The LeanStatement and LatexDefinition for a declaration reference should be in the same folder."
    allowedFilesWhenPresent:
      - pathFrom: statementLakefilePath
      - path: lean-toolchain
        relativeTo: packageRoot
      - path: lake-manifest.json
        relativeTo: packageRoot
      - pathFrom: "statements[].Statement.LeanStatement"
      - pathFrom: "statements[].Statement.LatexDefinition"
    packageContentRule: >
      The statement package should contain only expected statement-package files:
      its lakefile, optional package support files, and the Lean/LaTeX files
      listed by metadata.

  proofPackage:
    terminology: proof-package
    presentWhen:
      anyMetadataFieldPresent:
        - proofLakefilePath
        - proofs
    packageRoot: "dirname(proofLakefilePath)"
    lakefilePathFrom: proofLakefilePath
    requiredWhenPresent:
      - pathFrom: proofLakefilePath
        kind: file
      - pathFrom: "proofs[].Proof.File"
        kind: file
    optionalWhenPresent:
      - path: lean-toolchain
        relativeTo: packageRoot
      - path: lake-manifest.json
        relativeTo: packageRoot
    expectedContent:
      lakefile.lean:
        - "Defines the proof-side Lake package/library for this submission."
        - "Pins mathlib to lml-env.json mathlib.revision when declaring mathlib."
        - "Builds every proof file listed in metadata."
        - "May depend locally on a present statement package, but that split is not required."
      lean-toolchain:
        - "If present, contains exactly the Lean toolchain from lml-env.json lean.toolchain."
      proofLeanFiles:
        - "Each proof metadata entry has a proof theorem named by Proof.Name in Proof.File."
        - "The proof theorem's compiled type must be definitionally equal to the target statement named by Theorem.Name."
        - "Proof entry Type is one of proof, conditional-proof, or reduction."
        - "Proof files may rely on definitions, declared dependencies, Std, and Mathlib."
        - "Proof files must not leave submitted proof targets depending on sorryAx or local proof-namespace axioms."
        - "Direct imports may use Mathlib modules, Std modules, local statement/proof modules, and authorized imported packages only."

declarationReferences:
  recordShapeFrom: "meta.config.yaml#/$defs/declarationReference"
  expectedContent:
    - "Use CurrentSubmission: true for declarations inside the current submission."
    - "Use SubmissionSlug for declarations from another imported submission."
    - "Each reference records LeanStatement, LatexDefinition, and Name."
    - "LeanStatement and LatexDefinition should be in the same folder."
    - "Declaration references on proof entries are supported and checked independently from statement entries."
    - "Declared dependencies must include the actual Lean axiom dependencies found in proof terms."

submissionClassification:
  theorem:
    when: "An Axiom statement has a matching proof entry with Type proof or conditional-proof."
  conjecture:
    when: "An Axiom statement has a matching proof entry with Type reduction."
  definition:
    when: "A statement entry has Type Definition."
  proofTargetRule:
    - "Every proof entry Theorem.Name must match a metadata statement declaration."
    - "Proof entries discharge Axiom statements, not Definition statements."

buildAndCheckPolicy:
  packagePreparation:
    - "Prepare and build only packages that are present according to metadata."
    - "Lake update and build failures reject the submission."
    - "Cache fetch is best-effort and may warn without rejecting the submission."
  firstRunChecks:
    - "Validate metadata against meta.config.yaml before repository-aware checks."
    - "Check that every metadata-listed repository-local file exists."
    - "Check that statement package files match metadata exactly."
    - "Check allowed file extensions and extensionless filenames from lml-env.json."
    - "Check Lean imports against the allowed import and declared dependency policy."
    - "Check statement declarations with Lean inspection."
    - "Check proof declarations, definitional equality, axioms, and sorry usage with Lean inspection."
  finalProofBuildTarget:
    - "Recursively follow metadata references through submissions.jsonl."
    - "Rewrite proved dependency statements to their proof counterparts while leaving conjectures as conjectures."
    - "Use resulting .olean files for axiom testing."
    - "Compare computed dependency and conjecture information to metadata."
    - "Accepted composed proofs bottom out only in trusted base axioms and declared conjectures."

trustedBasePolicy:
  allowedMathlibAxiomsFrom: "lml-env.json#/checks/allowedMathlibAxioms"
  axiomMatching:
    - name
    - type
    - sourceModule
  expectedContent:
    - "Trusted base axiom signatures are pinned outside the submitted repository."
    - "A submitted repository must not be able to spoof a trusted axiom name with a different type or source module."

pathRules:
  repo-relative-file:
    type: string
    mustNotStartWith: /
    mustNotContainPathComponent: ..
    mustResolveInside: sourceRepositoryRoot
  repo-relative-file-within-referenced-submission:
    type: string
    mustNotStartWith: /
    mustNotContainPathComponent: ..
    resolvedBy: "CurrentSubmission or SubmissionSlug"
  repo-relative-file-within-theorem-submission:
    type: string
    mustNotStartWith: /
    mustNotContainPathComponent: ..
    resolvedBy: "proofs[].Theorem.SubmissionSlug"
