$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://lean-meta-library.local/schemas/output.config.yaml"
title: "Lean Meta Library submission output data"
description: >
  Schema for the data stored for a Lean Meta Library submission once it has been
  imported. Where manifest.config.yaml describes the author-supplied submission
  manifest, this output schema describes the structure of the data the workflow
  retains in the end. It is organized around three top-level groups:
  SubmissionData, holding the submission's identifying, bibliographic, and
  source-repository information; StatementSubmissions, holding the statement
  package root folder and its statement entries; and ProofSubmissions, holding
  the proof package root folder and its proof entries.
type: object
additionalProperties: false

required:
  - SubmissionData
  - StatementSubmissions
  - ProofSubmissions

properties:
  # ----------------------------------------------------------------------------
  # Submission-Data:
  #   SubmissionSlug, SubmissionName, AbstractPath, BibEntries, LicenseFile,
  #   ManifestPath, SubmissionUserId, Repo, Commit
  # ----------------------------------------------------------------------------
  SubmissionData:
    type: object
    description: >
      Identifying, bibliographic, and source-repository information for the
      submission itself (the Lean Meta Library entry).
    additionalProperties: false
    required:
      - SubmissionSlug
      - SubmissionName
      - AbstractPath
      - BibEntries
      - ManifestPath
      - SubmissionUserId
      - Repo
      - Commit
    properties:
      Repo:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        format: uri
        minLength: 1
        description: >
          Full repository URL. Inherited from manifest.config.yaml's githubRepo,
          which is created automatically by tooling/workflows.
      Commit:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          New output field. The full Git SHA of the repository state from which
          this submission was imported.
      ManifestPath:
        $ref: "#/$defs/repoRelativePath"
        description: >
          New output field. Repository-relative path to the submission's
          manifest file.
      SubmissionUserId:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          New output field. Identifier of the user who submitted this
          submission.
      SubmissionSlug:
        $ref: "#/$defs/submissionSlug"
        description: >
          Machine-facing slug for this submission. Lean package names are derived
          from this value. Inherited from manifest.config.yaml's submissionSlug.
      SubmissionName:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          Human-readable submission name. Inherited from manifest.config.yaml's
          submissionTitle.
      AbstractPath:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to abstract.tex. The abstract is a short
          summary of the submission's results. Inherited from
          manifest.config.yaml's abstractPath.
      BibEntries:
        type: array
        description: >
          BibTeX references for papers whose results are fully or partly
          formalized in this submission. Inherited from manifest.config.yaml's
          bibtex-entries.
        items:
          $ref: "#/$defs/safeText"
      LicenseFile:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to the submission's license file. Inherited
          from manifest.config.yaml's licensePath.

      manifestVersion:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          Version of the manifest format. Currently "1".
      leanVersion:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          The Lean version used by the submission packages. Must match the
          version pinned in lml-env.json.
      mathlibVersion:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: >
          The Mathlib revision used by the submission packages. Must match the
          revision pinned in lml-env.json.

      # Fields inherited from manifest.config.yaml that have no counterpart in the
      # requested output structure are preserved here unchanged.
      submittedBy:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "Created automatically by the submit workflow. User who initiated the submission."
      submissionIssueNumber:
        type: integer
        minimum: 1
        description: >
          Created automatically by the submit workflow. GitHub issue number for
          the issue used to manage this submission.
      submissionIssueUrl:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        format: uri
        description: >
          Created automatically by the submit workflow. URL of the GitHub issue
          used to manage this submission.

  # ----------------------------------------------------------------------------
  # Statement-Submissions: the statement package root folder and its statement
  # entries (the Statement-Informations).
  # ----------------------------------------------------------------------------
  StatementSubmissions:
    type: object
    description: >
      The submission's statement package: its root folder and the statement
      entries it publishes.
    additionalProperties: false
    required:
      - rootFolder
      - statements
    properties:
      rootFolder:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to the folder containing the statement
          package. The folder must contain a lakefile.lean and a lean-toolchain
          file. Inherited from manifest.config.yaml's statementRoot.
      statements:
        type: array
        minItems: 1
        description: >
          Entries that publish the submission's public definitions and axiom
          statements. Each entry names the public declaration, records whether it
          is a definition or axiom, points to the Lean declaration, and lists the
          declaration references and semantic dependencies used by that
          declaration.
        items:
          $ref: "#/$defs/statementEntry"

  # ----------------------------------------------------------------------------
  # Proof-Submissions: the proof package root folder and its proof entries
  # (the Proof-Informations).
  # ----------------------------------------------------------------------------
  ProofSubmissions:
    type: object
    description: >
      The submission's proof package: its root folder and the proof entries it
      records.
    additionalProperties: false
    required:
      - rootFolder
      - proofs
    properties:
      rootFolder:
        $ref: "#/$defs/repoRelativePath"
        description: >
          Repository-relative path to the folder containing the proof package.
          The folder must contain a lakefile.lean and a lean-toolchain file.
          Inherited from manifest.config.yaml's proofRoot.
      proofs:
        type: array
        description: >
          Entries that record proofs for statement axioms. Each entry names the
          proof declaration, the axiom it discharges, and the proof obligations
          it depends on. The target axiom must belong to a submission.
        items:
          $ref: "#/$defs/proofEntry"

$defs:
  safeText:
    type: string
    pattern: "^[\\t\\r\\n\\x20-\\x7E]*$"
    not:
      anyOf:
        - pattern: "`"
        - pattern: "\\$\\("
        - pattern: "\\$\\{"
        - pattern: ";"
        - pattern: "&&"
        - pattern: "\\|\\|"
        - pattern: "[<>]"
    description: >
      Plain ASCII text accepted by the manifest checkers. Rejects suspicious
      shell tokens such as backticks, command substitutions, shell separators,
      and angle brackets.

  repoRelativePath:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:/|$)).+$"
    description: "Relative path that must stay inside the repository root."

  submissionScopedName:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    pattern: "^[A-Z][A-Za-z0-9_']*\\.(Statements|Proofs)\\.[A-Za-z_][A-Za-z0-9_']*(\\.[A-Za-z_][A-Za-z0-9_']*)*$"
    description: >
      A global Lean declaration name scoped to a submission. It must start with
      a submission slug in PascalCase, followed by either ".Statements." or
      ".Proofs.", followed by the remaining namespace and declaration name, for
      example MySlug.Statements.MyNamespace.my_decl or
      MySlug.Proofs.MyNamespace.my_theorem.

  submissionSlug:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^[A-Za-z][A-Za-z0-9-]*$"

  statementEntry:
    type: object
    description: >
      Statement information entry. The Name is the fully-qualified declaration
      name of the form SubmissionSlug.Namespace(s).Name. Required fields are
      Name and Type. May carry an optional display Title, an inline TeX
      reference, an inline Lean statement, and semantic dependencies.
    additionalProperties: false
    required:
      - Name
      - Type
    properties:
      Name:
        $ref: "#/$defs/submissionScopedName"
        description: >
          Fully-qualified statement name of the form
          SubmissionSlug.Namespace(s).Name.
      Type:
        type: string
        enum:
          - Definition
          - Axiom
        description: "Statement entry kind."
      Title:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "New output field. Optional human-readable title for display."
      InlineTexReference:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        description: >
          New output field. Optional inline TeX reference for the statement, for
          display.
      InlineLeanStatement:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        description: >
          New output field. Optional inline Lean statement for the statement, for
          display.
      SemanticDependencies:
        type: array
        description: >
          New output field. Semantic dependencies of this statement, as a list of
          names of the form SubmissionSlug.Namespace(s).Name.
        items:
          $ref: "#/$defs/submissionScopedName"

  proofEntry:
    type: object
    description: >
      Proof information entry. The Name is the fully-qualified declaration name
      of the form SubmissionSlug.Namespace(s).Name. The only required field is
      Name. May carry an optional display Title, an inline TeX reference, an
      inline Lean statement, an axiom reference, and proof obligations expressed
      as dependencies.
    additionalProperties: false
    required:
      - Name
    properties:
      Name:
        $ref: "#/$defs/submissionScopedName"
        description: >
          Fully-qualified proof name of the form
          SubmissionSlug.Namespace(s).Name.
      Title:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "New output field. Optional human-readable title for display."
      InlineTexReference:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        description: >
          New output field. Optional inline TeX reference for the proof, for
          display.
      InlineLeanStatement:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        description: >
          New output field. Optional inline Lean statement for the proof, for
          display.
      AxiomReference:
        $ref: "#/$defs/submissionScopedName"
        description: >
          New output field. The axiom this proof discharges, as a name of the
          form SubmissionSlug.Namespace(s).Name. Mirrors the inherited axiom
          field in the requested dependency-name form.
      ProofObligations:
        type: array
        description: >
          New output field. Dependencies of this proof expressed as proof
          obligations, each a name of the form
          SubmissionSlug.Namespace(s).Name.
        items:
          $ref: "#/$defs/submissionScopedName"