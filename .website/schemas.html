<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schema Reference – Lean Meta Library</title>
  <style>
    body { margin: 0; padding: 0; }
    .back-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 40px;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }
    .back-link {
      color: #a0a8d0;
      text-decoration: none;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: #ffffff; }
    .back-link::before { content: "←"; }
    redoc { display: block; margin-top: 40px; }
  </style>
</head>
<body>
  <nav class="back-bar">
    <a class="back-link" href="index.html">Lean Meta Library</a>
  </nav>
  <redoc
    spec-url="openapi.yaml"
    expand-responses="200"
    theme='{
      "colors": {
        "primary": { "main": "#5B4FC5" }
      },
      "typography": {
        "fontSize": "15px",
        "fontFamily": "Inter, system-ui, -apple-system, sans-serif",
        "headings": {
          "fontFamily": "Inter, system-ui, -apple-system, sans-serif"
        },
        "code": {
          "fontFamily": "ui-monospace, SFMono-Regular, Menlo, monospace",
          "fontSize": "13px"
        }
      },
      "sidebar": {
        "width": "280px",
        "backgroundColor": "#1a1a2e",
        "textColor": "#e0e0e0"
      }
    }'
  ></redoc>
  <script src="https://cdn.jsdelivr.net/npm/redoc@latest/bundles/redoc.standalone.js"></script>
</body>
</html>
