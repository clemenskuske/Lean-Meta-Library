<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lean Meta Library</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f4;
        color: #202124;
      }

      main {
        width: min(42rem, calc(100% - 2rem));
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
        color: #4c4f54;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #171819;
          color: #f4f4ef;
        }

        p {
          color: #c7c8c3;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lean Meta Library</h1>
      <p>A placeholder GitHub Pages site for the Lean Meta Library.</p>
    </main>
  </body>
</html>
