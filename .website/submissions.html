<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lean Meta Library Browser</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f4;
        --side: #ecefe9;
        --panel: #ffffff;
        --soft: #fbfbf8;
        --text: #202124;
        --muted: #626a73;
        --line: #d9ddd5;
        --accent: #0f6b63;
        --accent-soft: #e3f1ee;
        --code: #f2f4f4;
        --warn: #8a4b00;
        --proof: #5f4bb6;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 15px;
        line-height: 1.45;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover { text-decoration: underline; }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
        border-right: 1px solid var(--line);
        background: var(--side);
        padding: 18px 14px 24px;
      }

      .brand {
        margin-bottom: 18px;
      }

      .eyebrow,
      .section-title,
      .search-label {
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand h1 {
        margin: 4px 0 0;
        font-size: 1.15rem;
        line-height: 1.2;
      }

      .nav-section {
        margin-top: 18px;
      }

      .nav-section h2,
      .section-title {
        margin: 0 0 7px;
      }

      .search-label {
        display: block;
        margin-bottom: 5px;
        text-transform: none;
        letter-spacing: 0;
      }

      .search-input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        background: var(--panel);
        color: var(--text);
        outline: none;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 107, 99, 0.12);
      }

      .stack {
        display: grid;
        gap: 4px;
      }

      .nav-link,
      .node-link {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: baseline;
        border-radius: 5px;
        padding: 5px 7px;
        color: var(--text);
      }

      .nav-link:hover,
      .node-link:hover,
      .nav-link.active,
      .node-link.active {
        background: var(--accent-soft);
        color: #063d39;
        text-decoration: none;
      }

      .nav-link.active,
      .node-link.active {
        font-weight: 700;
      }

      .node-name {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .badge,
      .pill {
        justify-self: end;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 1px 7px;
        background: var(--panel);
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
        white-space: nowrap;
      }

      .badge.axiom { color: var(--warn); }
      .badge.proof { color: var(--proof); }
      .badge.definition { color: var(--accent); }

      .outline details {
        margin-left: 4px;
        padding-left: 9px;
        border-left: 1px solid var(--line);
      }

      .outline details + details,
      .outline .leaf + details,
      .outline details + .leaf {
        margin-top: 5px;
      }

      .outline summary {
        cursor: pointer;
        padding: 3px 0;
        font-weight: 700;
      }

      .outline .leaf {
        display: block;
        border-radius: 4px;
        padding: 2px 4px;
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .outline .leaf:hover {
        background: rgba(15, 107, 99, 0.08);
        text-decoration: none;
      }

      .content {
        min-width: 0;
        padding: 30px min(5vw, 56px) 64px;
      }

      .topline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 18px;
      }

      h2,
      h3,
      p {
        margin: 0;
      }

      h2 {
        font-size: clamp(1.6rem, 3vw, 2.25rem);
        line-height: 1.15;
        overflow-wrap: anywhere;
      }

      h3 {
        font-size: 1rem;
      }

      .meta-line,
      .links-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .links-row {
        margin-top: 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        margin: 14px 0;
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        padding: 11px 14px;
        border-bottom: 1px solid var(--line);
        background: var(--soft);
      }

      .panel-body {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .record-list {
        display: grid;
        gap: 10px;
      }

      .record-row {
        display: grid;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--soft);
      }

      .record-title {
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      .record-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .inline-node {
        overflow-wrap: anywhere;
      }

      .abstract-text {
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .fact {
        display: block;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        background: var(--soft);
        color: inherit;
        min-width: 0;
      }

      button.fact {
        width: 100%;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }

      a.fact:hover,
      button.fact:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
        text-decoration: none;
      }

      a.fact:focus-visible,
      button.fact:focus-visible {
        outline: 3px solid rgba(15, 107, 99, 0.18);
        outline-offset: 2px;
      }

      .fact span {
        display: block;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
      }

      .fact strong {
        display: block;
        margin-top: 3px;
        overflow-wrap: anywhere;
      }

      .graph-scroll {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--soft);
      }

      .dependency-graph {
        position: relative;
        isolation: isolate;
      }

      .graph-edge-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .graph-edge {
        fill: none;
        stroke: #9aa39d;
        stroke-width: 1.5;
      }

      .graph-node {
        position: absolute;
        z-index: 1;
        display: block;
        width: 18px;
        height: 18px;
        border: 2px solid currentColor;
        border-radius: 50%;
        padding: 0;
        background: var(--panel);
        color: var(--text);
        box-shadow: 0 4px 10px rgba(32, 33, 36, 0.08);
      }

      .graph-node:hover {
        filter: saturate(1.1) brightness(0.98);
        text-decoration: none;
      }

      .graph-node.current {
        outline: 4px double currentColor;
        outline-offset: 3px;
      }

      .graph-node.external {
        border-style: dashed;
      }

      .graph-node.definition {
        color: var(--accent);
        background: var(--accent);
      }

      .graph-node.proof {
        color: var(--proof);
        background: var(--proof);
      }

      .graph-node.axiom {
        color: #b42318;
        background: #b42318;
      }

      code,
      pre {
        border-radius: 6px;
        background: var(--code);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      }

      code {
        padding: 2px 5px;
        overflow-wrap: anywhere;
      }

      pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        white-space: pre-wrap;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-top: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }

      th {
        width: 170px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .empty,
      .error {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
        color: var(--muted);
      }

      .error {
        border-color: #e3a5a5;
        background: #fff1f1;
        color: #7d2525;
      }

      .mobile-home {
        display: none;
      }

      @media (max-width: 860px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .content {
          padding: 22px 16px 48px;
        }

        .mobile-home {
          display: inline-flex;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="eyebrow">Lean Meta Library</div>
          <h1 id="site-title">Loading submissions...</h1>
        </div>

        <section class="nav-section">
          <h2 class="section-title">Submission Entries</h2>
          <div id="submission-list" class="stack"></div>
        </section>

        <section class="nav-section">
          <h2 class="section-title">Dependency Outline</h2>
          <div id="dependency-outline" class="outline"></div>
        </section>

        <section class="nav-section">
          <h2 class="section-title">All Nodes</h2>
          <label class="search-label" for="node-search">Search nodes</label>
          <input id="node-search" class="search-input" type="search" autocomplete="off" placeholder="Declaration name">
          <div id="node-list" class="stack" style="margin-top: 8px;"></div>
        </section>
      </aside>

      <main id="content" class="content" tabindex="-1">
        <div class="empty">Loading submissions...</div>
      </main>
    </div>

    <script>
      const submissionsJsonlUrl = "https://raw.githubusercontent.com/clemenskuske/Lean-Meta-Library/main/submissions.jsonl";
      const state = {
        rows: [],
        submissions: [],
        nodes: [],
        nodeByName: new Map(),
        abstracts: new Map(),
        active: "overview",
        query: ""
      };

      const els = {
        title: document.querySelector("#site-title"),
        submissionList: document.querySelector("#submission-list"),
        outline: document.querySelector("#dependency-outline"),
        nodeSearch: document.querySelector("#node-search"),
        nodeList: document.querySelector("#node-list"),
        content: document.querySelector("#content")
      };

      els.nodeSearch.addEventListener("input", () => {
        state.query = els.nodeSearch.value.trim().toLowerCase();
        renderSidebar();
      });

      els.content.addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-scroll-target]");
        if (!trigger) return;
        const target = document.querySelector(trigger.dataset.scrollTarget);
        if (!target) return;
        target.scrollIntoView({ block: "start", behavior: "smooth" });
      });

      window.addEventListener("hashchange", route);
      load();

      async function load() {
        try {
          const result = await fetchRows();
          state.rows = result.rows;
          state.submissions = state.rows.map(normalizeSubmission);
          state.nodes = state.submissions.flatMap((submission) => submission.nodes);
          state.nodeByName = new Map(state.nodes.map((node) => [node.name, node]));
          route();
        } catch (error) {
          els.title.textContent = "Load failed";
          els.content.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
        }
      }

      async function fetchRows() {
        try {
          const response = await fetch(`${submissionsJsonlUrl}?v=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`${response.status} ${response.statusText}`);
          }
          return { path: submissionsJsonlUrl, rows: parseJsonl(await response.text()) };
        } catch (error) {
          throw new Error(`Could not load ${submissionsJsonlUrl}: ${error.message}`);
        }
      }

      function parseJsonl(text) {
        return String(text || "")
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line, index) => {
            try {
              return JSON.parse(line);
            } catch (error) {
              throw new Error(`submissions.jsonl line ${index + 1} is not valid JSON: ${error.message}`);
            }
          });
      }

      function normalizeSubmission(row, index) {
        const data = row.SubmissionData || {};
        const statementPackage = row.StatementSubmissions || {};
        const proofPackage = row.ProofSubmissions || {};
        const id = slugify(data.SubmissionSlug || data.SubmissionName || `submission-${index + 1}`);
        const submission = {
          id,
          row,
          data,
          title: data.SubmissionName || `Submission ${index + 1}`,
          slug: data.SubmissionSlug || "",
          repo: data.Repo || "",
          commit: data.Commit || "",
          manifest: data.ManifestPath || "",
          issueUrl: data.submissionIssueUrl || "",
          issueNumber: data.submissionIssueNumber || "",
          submittedBy: data.submittedBy || data.SubmissionUserId || "",
          statementRoot: statementPackage.rootFolder || "",
          proofRoot: proofPackage.rootFolder || "",
          statements: Array.isArray(statementPackage.statements) ? statementPackage.statements : [],
          proofs: Array.isArray(proofPackage.proofs) ? proofPackage.proofs : []
        };
        submission.nodes = [
          ...submission.statements.map((entry) => nodeFromStatement(submission, entry)),
          ...submission.proofs.map((entry) => nodeFromProof(submission, entry))
        ];
        return submission;
      }

      function nodeFromStatement(submission, entry) {
        return {
          submission,
          name: entry.Name || "",
          title: entry.Title || "",
          kind: entry.Type === "Definition" ? "definition" : "axiom",
          tex: entry.InlineTexReference || "",
          lean: entry.InlineLeanStatement || "",
          dependencies: unique(entry.SemanticDependencies || []),
          raw: entry
        };
      }

      function nodeFromProof(submission, entry) {
        return {
          submission,
          name: entry.Name || "",
          title: entry.Title || "",
          kind: "proof",
          tex: entry.InlineTexReference || "",
          lean: entry.InlineLeanStatement || "",
          dependencies: unique([entry.AxiomReference, ...(entry.ProofObligations || [])].filter(Boolean)),
          axiomReference: entry.AxiomReference || "",
          raw: entry
        };
      }

      function route() {
        state.active = decodeURIComponent(window.location.hash.replace(/^#/, "")) || "overview";
        renderSidebar();
        renderContent();
      }

      function renderSidebar() {
        els.title.textContent = state.submissions.length
          ? `${state.submissions.length} submissions`
          : "No submissions yet";
        els.submissionList.innerHTML = state.submissions.length
          ? [
              ...state.submissions.map((submission) => navLink(submissionHref(submission), submission.title, `${submission.nodes.length} nodes`, state.active === submissionRoute(submission)))
            ].join("")
          : `<div class="empty">Once submissions.jsonl has rows, they will appear here.</div>`;
        els.outline.innerHTML = renderOutline();
        renderNodeList();
      }

      function renderNodeList() {
        const nodes = state.nodes
          .filter((node) => {
            if (!state.query) return true;
            return [
              node.name,
              node.title,
              node.kind,
              node.submission.title,
              node.submission.slug
            ].join(" ").toLowerCase().includes(state.query);
          })
          .slice(0, 120);

        els.nodeList.innerHTML = nodes.length
          ? nodes.map((node) => nodeLink(node)).join("")
          : `<div class="empty">No matching nodes.</div>`;
      }

      function renderOutline() {
        if (state.submissions.length === 0) {
          return `<div class="empty">No dependency outline yet.</div>`;
        }
        return state.submissions.map((submission) => `
          <details open>
            <summary>${escapeHtml(submission.title)}</summary>
            <div class="tree">
              ${submission.nodes.map((node) => outlineNode(node, new Set())).join("")}
            </div>
          </details>
        `).join("");
      }

      function outlineNode(node, seen) {
        const repeated = seen.has(node.name);
        const nextSeen = new Set(seen);
        nextSeen.add(node.name);
        const children = repeated ? [] : node.dependencies.map((name) => state.nodeByName.get(name)).filter(Boolean);
        if (children.length === 0) {
          return `<a class="leaf" href="${nodeHref(node)}">${escapeHtml(nodeDisplayName(node))}</a>`;
        }
        return `
          <details>
            <summary><a href="${nodeHref(node)}">${escapeHtml(nodeDisplayName(node))}</a></summary>
            ${children.map((child) => outlineNode(child, nextSeen)).join("")}
          </details>
        `;
      }

      function renderContent() {
        if (state.active === "overview") {
          renderOverview();
          return;
        }
        if (state.active === "submissions") {
          renderSubmissionList();
          return;
        }
        if (state.active === "statements") {
          renderNodeListView("Statements", statementNodes());
          return;
        }
        if (state.active === "proofs") {
          renderNodeListView("Proofs", proofNodes());
          return;
        }
        const submission = state.submissions.find((item) => submissionRoute(item) === state.active);
        if (submission) {
          renderSubmission(submission);
          return;
        }
        const node = state.nodeByName.get(state.active);
        if (node) {
          renderNode(node);
          return;
        }
        els.content.innerHTML = `<div class="empty">Select a submission or declaration from the sidebar.</div>`;
      }

      function renderOverview() {
        els.content.innerHTML = `
          <div class="topline">
            <div>
              <h2>Submissions</h2>
              <div class="meta-line">
                <span>Browse imported submissions, statement targets, proof targets, and recorded dependencies.</span>
              </div>
            </div>
            <a class="pill mobile-home" href="index.html">Home</a>
          </div>
          <section class="panel">
            <div class="panel-head">
              <h3>Library Contents</h3>
              <span class="badge">${state.submissions.length}</span>
            </div>
            <div class="panel-body">
              <div class="grid">
                ${factLink("Submissions", state.submissions.length, "#submissions")}
                ${factLink("Statements", statementNodes().length, "#statements")}
                ${factLink("Proofs", proofNodes().length, "#proofs")}
                ${fact("Dependencies", dependencyCount())}
              </div>
            </div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <h3>Recent Submissions</h3>
              <span class="badge">${state.submissions.length}</span>
            </div>
            <div class="panel-body">
              <div class="record-list">
                ${state.submissions.length ? state.submissions.map(submissionSummary).join("") : `<div class="empty">No imported submissions yet.</div>`}
              </div>
            </div>
          </section>
        `;
      }

      function renderSubmissionList() {
        els.content.innerHTML = `
          <div class="topline">
            <div>
              <h2>Submissions</h2>
              <div class="meta-line">
                <span>${state.submissions.length} imported entries</span>
              </div>
            </div>
            <a class="pill mobile-home" href="index.html">Home</a>
          </div>
          <section class="panel">
            <div class="panel-head">
              <h3>Submission List</h3>
              <span class="badge">${state.submissions.length}</span>
            </div>
            <div class="panel-body">
              <div class="record-list">
                ${state.submissions.length ? state.submissions.map(submissionSummary).join("") : `<div class="empty">No imported submissions yet.</div>`}
              </div>
            </div>
          </section>
        `;
      }

      function renderNodeListView(title, nodes) {
        els.content.innerHTML = `
          <div class="topline">
            <div>
              <h2>${escapeHtml(title)}</h2>
              <div class="meta-line">
                <span>${nodes.length} recorded ${title.toLowerCase()}</span>
              </div>
            </div>
            <a class="pill mobile-home" href="index.html">Home</a>
          </div>
          <section class="panel">
            <div class="panel-head">
              <h3>${escapeHtml(title)} List</h3>
              <span class="badge">${nodes.length}</span>
            </div>
            <div class="panel-body">
              <div class="record-list">
                ${nodes.length ? nodes.map(nodeSummary).join("") : `<div class="empty">No ${escapeHtml(title.toLowerCase())} recorded.</div>`}
              </div>
            </div>
          </section>
        `;
      }

      function renderSubmission(submission) {
        els.content.innerHTML = `
          <div class="topline">
            <div>
              <h2>${escapeHtml(submission.title)}</h2>
              <div class="meta-line">
                ${submission.slug ? `<span>${escapeHtml(submission.slug)}</span>` : ""}
                ${submission.submittedBy ? `<span>submitted by ${escapeHtml(submission.submittedBy)}</span>` : ""}
                ${submission.issueNumber ? `<span>issue #${escapeHtml(String(submission.issueNumber))}</span>` : ""}
              </div>
            </div>
            <div class="links-row">
              ${sourceFolderUrl(submission, ".") ? `<a class="pill" href="${escapeAttr(sourceFolderUrl(submission, "."))}" target="_blank" rel="noopener">Source Folder</a>` : ""}
              ${commitUrl(submission) ? `<a class="pill" href="${escapeAttr(commitUrl(submission))}" target="_blank" rel="noopener">Commit</a>` : ""}
              ${submission.issueUrl ? `<a class="pill" href="${escapeAttr(submission.issueUrl)}" target="_blank" rel="noopener">Issue</a>` : ""}
            </div>
          </div>

          <section class="panel">
            <div class="panel-head">
              <h3>Submission</h3>
              <span class="badge">${escapeHtml(submission.slug || "entry")}</span>
            </div>
            <div class="panel-body">
              <div class="grid">
                ${factScroll("Statements", submission.statements.length, "#statement-targets")}
                ${factScroll("Proofs", submission.proofs.length, "#proof-targets")}
                ${factSource("Statement root", submission.statementRoot || "Not recorded", sourceFolderUrl(submission, submission.statementRoot || "."))}
                ${factSource("Proof root", submission.proofRoot || "Not recorded", sourceFolderUrl(submission, submission.proofRoot || "."))}
              </div>
              ${infoTable([
                ["Name", internalLink(submissionHref(submission), submission.title)],
                ["Repository folder", sourceFolderLink(submission, ".", sourceLabel(submission))],
                ["Manifest", sourceFileLink(submission, submission.manifest, submission.manifest || "Not recorded", { rootRelative: true })],
                ["License", sourceFileLink(submission, submission.data.LicenseFile, submission.data.LicenseFile || "Not recorded")],
                ["Commit", commitUrl(submission) ? externalLink(commitUrl(submission), shortCommit(submission.commit) || submission.commit) : code("Not recorded")]
              ])}
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>Abstract</h3>
              ${sourceFileUrl(submission, submission.data.AbstractPath) ? `<a class="pill" href="${escapeAttr(sourceFileUrl(submission, submission.data.AbstractPath))}" target="_blank" rel="noopener">Source</a>` : ""}
            </div>
            <div class="panel-body">
              ${renderAbstract(submission)}
            </div>
          </section>

          <section class="panel" id="statement-targets">
            <div class="panel-head">
              <h3>Statement Targets</h3>
              <span class="badge">${submission.statements.length}</span>
            </div>
            <div class="panel-body">
              ${submission.statements.length ? submission.statements.map((entry) => nodeLink(state.nodeByName.get(entry.Name))).join("") : `<div class="empty">No statements recorded.</div>`}
            </div>
          </section>

          <section class="panel" id="proof-targets">
            <div class="panel-head">
              <h3>Proof Targets</h3>
              <span class="badge">${submission.proofs.length}</span>
            </div>
            <div class="panel-body">
              ${submission.proofs.length ? submission.proofs.map((entry) => nodeLink(state.nodeByName.get(entry.Name))).join("") : `<div class="empty">No proofs recorded.</div>`}
            </div>
          </section>
        `;
      }

      function renderNode(node) {
        const dependents = state.nodes.filter((candidate) => candidate.dependencies.includes(node.name));
        els.content.innerHTML = `
          <div class="topline">
            <div>
              <h2>${escapeHtml(nodeDisplayName(node))}</h2>
              <div class="meta-line">
                <span>${escapeHtml(node.submission.title)}</span>
                <span>${escapeHtml(node.kind)}</span>
                ${node.axiomReference ? `<span>proves ${escapeHtml(node.axiomReference)}</span>` : ""}
              </div>
            </div>
            <div class="links-row">
              <a class="pill" href="${submissionHref(node.submission)}">Submission</a>
            </div>
          </div>

          <section class="panel">
            <div class="panel-head">
              <h3>Declaration</h3>
              <span class="badge ${escapeAttr(node.kind)}">${escapeHtml(node.kind)}</span>
            </div>
            <div class="panel-body">
              ${infoTable([
                ...(node.title ? [["Title", escapeHtml(node.title)]] : []),
                ["Name", code(node.name || "Not recorded")],
                ["Type", code(node.raw.Type || node.kind)],
                ["Submission", internalLink(submissionHref(node.submission), node.submission.title)],
                ["Axiom reference", node.axiomReference ? dependencyLink(node.axiomReference) : code("None")]
              ])}
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>Dependencies</h3>
              <span class="badge">${node.dependencies.length}</span>
            </div>
            <div class="panel-body">
              ${node.dependencies.length ? node.dependencies.map((name) => dependencyLink(name)).join("") : `<div class="empty">No dependencies recorded.</div>`}
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>Dependency DAG</h3>
              <span class="badge">${dependencyGraphFor(node).nodes.length}</span>
            </div>
            <div class="panel-body">
              ${renderDependencyGraph(node)}
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>Dependents</h3>
              <span class="badge">${dependents.length}</span>
            </div>
            <div class="panel-body">
              ${dependents.length ? dependents.map(nodeLink).join("") : `<div class="empty">No recorded dependents.</div>`}
            </div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>TeX</h3>
            </div>
            <div class="panel-body">${node.tex ? `<pre>${escapeHtml(node.tex)}</pre>` : `<div class="empty">No InlineTexReference recorded.</div>`}</div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <h3>Lean</h3>
            </div>
            <div class="panel-body">${node.lean ? `<pre>${escapeHtml(node.lean)}</pre>` : `<div class="empty">No InlineLeanStatement recorded.</div>`}</div>
          </section>
        `;
      }

      function renderDependencyGraph(root) {
        const graph = dependencyGraphFor(root);
        const layout = dependencyGraphLayout(graph.nodes);
        const edgePaths = graph.edges
          .map((edge) => dependencyGraphEdgePath(edge, layout.positions))
          .filter(Boolean)
          .map((path) => `<path class="graph-edge" d="${escapeAttr(path)}"></path>`)
          .join("");
        const graphNodes = graph.nodes.map((item) => dependencyGraphNodeHtml(item, layout.positions.get(item.name))).join("");

        return `
          <div class="graph-scroll">
            <div class="dependency-graph" style="width: ${layout.width}px; height: ${layout.height}px;">
              <svg class="graph-edge-layer" width="${layout.width}" height="${layout.height}" viewBox="0 0 ${layout.width} ${layout.height}" aria-hidden="true">
                <defs>
                  <marker id="dependency-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
                    <path d="M 0 0 L 8 4 L 0 8 z" fill="#9aa39d"></path>
                  </marker>
                </defs>
                <g marker-end="url(#dependency-arrow)">${edgePaths}</g>
              </svg>
              ${graphNodes}
            </div>
          </div>
        `;
      }

      function dependencyGraphFor(root) {
        const nodes = new Map();
        const edgeSet = new Set();
        const edges = [];

        function remember(name, depth) {
          const existing = nodes.get(name);
          const resolved = state.nodeByName.get(name);
          if (!existing) {
            nodes.set(name, {
              name,
              depth,
              node: resolved,
              kind: resolved?.kind || "external",
              current: name === root.name
            });
            return;
          }
          existing.depth = Math.max(existing.depth, depth);
        }

        function visit(name, depth, path) {
          remember(name, depth);
          const resolved = state.nodeByName.get(name);
          if (!resolved || path.has(name)) return;

          const nextPath = new Set(path);
          nextPath.add(name);
          for (const dependency of resolved.dependencies) {
            remember(dependency, depth + 1);
            const edgeKey = `${name}\n${dependency}`;
            if (!edgeSet.has(edgeKey)) {
              edgeSet.add(edgeKey);
              edges.push({ from: name, to: dependency });
            }
            if (!nextPath.has(dependency)) {
              visit(dependency, depth + 1, nextPath);
            }
          }
        }

        visit(root.name, 0, new Set());
        return {
          nodes: [...nodes.values()].sort((left, right) => left.depth - right.depth || left.name.localeCompare(right.name)),
          edges
        };
      }

      function dependencyGraphLayout(nodes) {
        const nodeWidth = 18;
        const nodeHeight = 18;
        const xGap = 30;
        const yGap = 42;
        const margin = 18;
        const byDepth = new Map();
        for (const node of nodes) {
          if (!byDepth.has(node.depth)) byDepth.set(node.depth, []);
          byDepth.get(node.depth).push(node);
        }

        const depths = [...byDepth.keys()].sort((left, right) => left - right);
        const maxRows = Math.max(1, ...[...byDepth.values()].map((items) => items.length));
        const width = margin * 2 + maxRows * nodeWidth + Math.max(0, maxRows - 1) * xGap;
        const height = margin * 2 + depths.length * nodeHeight + Math.max(0, depths.length - 1) * yGap;
        const positions = new Map();

        depths.forEach((depth, row) => {
          const items = byDepth.get(depth);
          const rowWidth = items.length * nodeWidth + Math.max(0, items.length - 1) * xGap;
          const leftOffset = margin + Math.max(0, (width - margin * 2 - rowWidth) / 2);
          items.forEach((item, column) => {
            positions.set(item.name, {
              x: leftOffset + column * (nodeWidth + xGap),
              y: margin + row * (nodeHeight + yGap),
              width: nodeWidth,
              height: nodeHeight
            });
          });
        });

        return { width, height, positions };
      }

      function dependencyGraphEdgePath(edge, positions) {
        const from = positions.get(edge.from);
        const to = positions.get(edge.to);
        if (!from || !to) return "";
        const startX = from.x + from.width / 2;
        const startY = from.y + from.height;
        const endX = to.x + to.width / 2;
        const endY = to.y;
        const control = Math.max(10, Math.abs(endY - startY) / 2);
        return `M ${startX} ${startY} C ${startX} ${startY + control}, ${endX} ${endY - control}, ${endX} ${endY}`;
      }

      function dependencyGraphNodeHtml(item, position) {
        const label = dependencyGraphNodeLabel(item);
        const href = item.node ? nodeHref(item.node) : "";
        const classes = [
          "graph-node",
          item.kind,
          item.current ? "current" : "",
          item.node ? "" : "external"
        ].filter(Boolean).join(" ");
        const style = `left: ${position.x}px; top: ${position.y}px;`;
        return href
          ? `<a class="${escapeAttr(classes)}" style="${escapeAttr(style)}" href="${href}" title="${escapeAttr(label)}" aria-label="${escapeAttr(label)}"></a>`
          : `<div class="${escapeAttr(classes)}" style="${escapeAttr(style)}" title="${escapeAttr(label)}" aria-label="${escapeAttr(label)}"></div>`;
      }

      function dependencyGraphNodeLabel(item) {
        return item.node?.title || item.node?.raw?.Title || item.name || "Unnamed";
      }

      function navLink(href, label, badge, active) {
        return `
          <a class="nav-link${active ? " active" : ""}" href="${href}">
            <span class="node-name">${escapeHtml(label)}</span>
            <span class="badge">${escapeHtml(badge)}</span>
          </a>
        `;
      }

      function nodeLink(node) {
        if (!node) return "";
        return `
          <a class="node-link${state.active === node.name ? " active" : ""}" href="${nodeHref(node)}">
            <span class="node-name">${escapeHtml(nodeDisplayName(node))}</span>
            <span class="badge ${escapeAttr(node.kind)}">${escapeHtml(node.kind)}</span>
          </a>
        `;
      }

      function dependencyLink(name) {
        const node = state.nodeByName.get(name);
        return node
          ? nodeLink(node)
          : `<div class="node-link"><span class="node-name">${escapeHtml(name)}</span><span class="badge">external</span></div>`;
      }

      function submissionSummary(submission) {
        return `
          <div class="record-row">
            <a class="record-title" href="${submissionHref(submission)}">${escapeHtml(submission.title)}</a>
            <div class="record-meta">
              ${sourceFolderUrl(submission, ".") ? externalLink(sourceFolderUrl(submission, "."), sourceLabel(submission)) : `<span>${escapeHtml(sourceLabel(submission))}</span>`}
              ${sourceFileUrl(submission, submission.data.LicenseFile) ? externalLink(sourceFileUrl(submission, submission.data.LicenseFile), "License") : ""}
            </div>
            ${renderAbstract(submission)}
          </div>
        `;
      }

      function nodeSummary(node) {
        return `
          <div class="record-row">
            <a class="record-title" href="${nodeHref(node)}">${escapeHtml(nodeDisplayName(node))}</a>
            <div class="record-meta">
              <span class="badge ${escapeAttr(node.kind)}">${escapeHtml(node.kind)}</span>
              ${internalLink(submissionHref(node.submission), node.submission.title)}
              ${node.axiomReference ? `<span>proves ${inlineDependencyLink(node.axiomReference)}</span>` : ""}
            </div>
            ${node.dependencies.length ? `<div class="record-meta"><span>Dependencies</span>${node.dependencies.map(inlineDependencyLink).join("")}</div>` : ""}
          </div>
        `;
      }

      function fact(label, value) {
        return `<div class="fact"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value))}</strong></div>`;
      }

      function factLink(label, value, href) {
        return `<a class="fact" href="${escapeAttr(href)}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value))}</strong></a>`;
      }

      function factScroll(label, value, target) {
        return `<button class="fact" type="button" data-scroll-target="${escapeAttr(target)}"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value))}</strong></button>`;
      }

      function factSource(label, value, href) {
        return href
          ? `<a class="fact" href="${escapeAttr(href)}" target="_blank" rel="noopener"><span>${escapeHtml(label)}</span><strong>${escapeHtml(String(value))}</strong></a>`
          : fact(label, value);
      }

      function factHtml(label, html) {
        return `<div class="fact"><span>${escapeHtml(label)}</span><strong>${html}</strong></div>`;
      }

      function infoTable(rows) {
        return `
          <table>
            <tbody>${rows.map(([label, value]) => `<tr><th>${escapeHtml(label)}</th><td>${value}</td></tr>`).join("")}</tbody>
          </table>
        `;
      }

      function dependencyCount() {
        return state.nodes.reduce((sum, node) => sum + node.dependencies.length, 0);
      }

      function statementNodes() {
        return state.nodes.filter((node) => node.kind !== "proof");
      }

      function proofNodes() {
        return state.nodes.filter((node) => node.kind === "proof");
      }

      function submissionRoute(submission) {
        return `submission/${submission.id}`;
      }

      function submissionHref(submission) {
        return `#${encodeURIComponent(submissionRoute(submission))}`;
      }

      function nodeHref(node) {
        return `#${encodeURIComponent(node.name)}`;
      }

      function nodeDisplayName(node) {
        return node?.title || node?.name || "Unnamed";
      }

      function slugify(value) {
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "") || "submission";
      }

      function shortCommit(value) {
        return value ? String(value).slice(0, 12) : "";
      }

      function code(value) {
        return `<code>${escapeHtml(value)}</code>`;
      }

      function internalLink(href, label) {
        return `<a href="${escapeAttr(href)}">${escapeHtml(String(label))}</a>`;
      }

      function externalLink(href, label) {
        return `<a href="${escapeAttr(href)}" target="_blank" rel="noopener">${escapeHtml(String(label))}</a>`;
      }

      function inlineDependencyLink(name) {
        const node = state.nodeByName.get(name);
        return node
          ? `<a class="inline-node" href="${nodeHref(node)}">${escapeHtml(nodeDisplayName(node))}</a>`
          : `<span class="inline-node">${escapeHtml(name)}</span>`;
      }

      function sourceFolderLink(submission, path, label) {
        const url = sourceFolderUrl(submission, path);
        return url ? externalLink(url, label) : code(label);
      }

      function sourceFileLink(submission, path, label, options = {}) {
        const url = sourceFileUrl(submission, path, options);
        return url ? externalLink(url, label) : code(label);
      }

      function sourceLabel(submission) {
        const repo = cleanRepoUrl(submission.repo) || "Repository";
        const folder = submissionBasePath(submission) || ".";
        const commit = shortCommit(submission.commit);
        return `${repo.replace(/^https?:\/\//, "")}${commit ? ` @ ${commit}` : ""} / ${folder}`;
      }

      function sourceFolderUrl(submission, path) {
        return sourceUrl(submission, path, "tree");
      }

      function sourceFileUrl(submission, path, options = {}) {
        return sourceUrl(submission, path, "blob", options);
      }

      function sourceRawUrl(submission, path) {
        const repo = githubRepoParts(submission.repo);
        const resolved = submissionSourcePath(submission, path);
        if (!repo || !submission.commit || !resolved) return "";
        return `https://raw.githubusercontent.com/${repo.owner}/${repo.name}/${encodeURIComponent(submission.commit)}/${encodePath(resolved)}`;
      }

      function sourceUrl(submission, path, kind, options = {}) {
        const repo = cleanRepoUrl(submission.repo);
        if (!repo || !submission.commit) return "";
        const resolved = options.rootRelative ? normalizeRepoPath(path) : submissionSourcePath(submission, path);
        const commit = encodeURIComponent(submission.commit);
        if (!resolved || resolved === ".") return `${repo}/${kind}/${commit}`;
        return `${repo}/${kind}/${commit}/${encodePath(resolved)}`;
      }

      function commitUrl(submission) {
        const repo = cleanRepoUrl(submission.repo);
        return repo && submission.commit ? `${repo}/commit/${encodeURIComponent(submission.commit)}` : "";
      }

      function submissionSourcePath(submission, path) {
        return joinRepoPath(submissionBasePath(submission), path);
      }

      function submissionBasePath(submission) {
        return dirnameRepoPath(submission.manifest);
      }

      function cleanRepoUrl(value) {
        const repo = String(value || "").trim().replace(/\/+$/, "").replace(/\.git$/, "");
        return repo || "";
      }

      function githubRepoParts(value) {
        try {
          const url = new URL(cleanRepoUrl(value));
          if (url.hostname !== "github.com") return null;
          const [owner, name] = url.pathname.replace(/^\/+/, "").split("/");
          if (!owner || !name) return null;
          return { owner, name: name.replace(/\.git$/, "") };
        } catch {
          return null;
        }
      }

      function dirnameRepoPath(path) {
        const normalized = normalizeRepoPath(path);
        if (!normalized || normalized === "." || !normalized.includes("/")) return "";
        return normalized.split("/").slice(0, -1).join("/");
      }

      function joinRepoPath(...parts) {
        return normalizeRepoPath(parts.filter(Boolean).join("/"));
      }

      function normalizeRepoPath(path) {
        const pieces = String(path || "")
          .split("/")
          .filter((piece) => piece && piece !== ".");
        const safe = [];
        for (const piece of pieces) {
          if (piece === "..") continue;
          safe.push(piece);
        }
        return safe.join("/");
      }

      function encodePath(path) {
        return normalizeRepoPath(path).split("/").map(encodeURIComponent).join("/");
      }

      function renderAbstract(submission) {
        const path = submission.data.AbstractPath || "";
        const source = sourceFileUrl(submission, path);
        if (!path) {
          return `<div class="empty">No abstract path recorded.</div>`;
        }

        ensureAbstract(submission);
        const record = state.abstracts.get(submission.id);
        if (!record || record.status === "loading") {
          return `<div class="empty">Loading abstract from ${source ? externalLink(source, path) : code(path)}...</div>`;
        }
        if (record.status === "error") {
          return `<div class="empty">Could not load abstract. ${source ? externalLink(source, "Open source") : ""}</div>`;
        }
        return `<p class="abstract-text">${escapeHtml(parseTexAbstract(record.text))}</p>`;
      }

      function ensureAbstract(submission) {
        if (state.abstracts.has(submission.id)) return;
        const rawUrl = sourceRawUrl(submission, submission.data.AbstractPath || "");
        if (!rawUrl) {
          state.abstracts.set(submission.id, { status: "error", text: "", error: "No raw URL" });
          return;
        }
        state.abstracts.set(submission.id, { status: "loading", text: "", error: "" });
        fetch(rawUrl, { cache: "force-cache" })
          .then((response) => {
            if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
            return response.text();
          })
          .then((text) => {
            state.abstracts.set(submission.id, { status: "ready", text, error: "" });
            renderContent();
          })
          .catch((error) => {
            state.abstracts.set(submission.id, { status: "error", text: "", error: error.message });
            renderContent();
          });
      }

      function parseTexAbstract(text) {
        return String(text || "")
          .replace(/(^|[^\\])%.*$/gm, "$1")
          .replace(/\\begin\{abstract\}|\\end\{abstract\}/g, "")
          .replace(/\\(?:emph|textit|textbf|textrm|texttt)\{([^{}]*)\}/g, "$1")
          .replace(/\\(?:cite|ref|eqref|label)\{[^{}]*\}/g, "")
          .replace(/\$\$([\s\S]*?)\$\$/g, " $1 ")
          .replace(/\$([^$]*)\$/g, " $1 ")
          .replace(/\\\(([\s\S]*?)\\\)/g, " $1 ")
          .replace(/\\\[([\s\S]*?)\\\]/g, " $1 ")
          .replace(/\\([%&_$#{}])/g, "$1")
          .replace(/~+/g, " ")
          .replace(/\\[a-zA-Z]+\*?(?:\[[^\]]*\])?(?:\{([^{}]*)\})?/g, "$1")
          .replace(/[{}]/g, "")
          .replace(/\s+/g, " ")
          .trim() || "No abstract text could be parsed.";
      }

      function unique(items) {
        return Array.from(new Set(items.filter(Boolean).map(String)));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
