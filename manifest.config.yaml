$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://lean-meta-library.local/schemas/manifest.config.yaml"
title: "Lean Meta Library metadata"
description: >
  Schema for Lean Meta Library manifest.yaml files. Fields marked as created
  fields are populated by tooling/workflows rather than supplied by the initial
  author.
$comment: >
  Each present Lake package has its own lean-toolchain file at its package root.
  lml-env.json pins the Lean version and the Mathlib base import; package
  toolchain files are checked against that fixed Lean version.
type: object
additionalProperties: false

required:
  - abstractPath
  - submissionTitle
  - submissionSlug
  - bibtex-entries

dependentRequired:
  proofs:
    - proofRoot
  proofRoot:
    - proofs
  statements:
    - statementRoot
  statementRoot:
    - statements

properties:
  manifestVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      Version of the manifest format. Currently "1".

  leanVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      The Lean version used by the submission packages. Must match the version
      pinned in lml-env.json.

  mathlibVersion:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: >
      The Mathlib revision used by the submission packages. Must match the
      revision pinned in lml-env.json.

  licensePath:
    $ref: "#/$defs/repoRelativePath"
    description: >
      Repository-relative path to the license file for this submission.

  statementRoot:
    $ref: "#/$defs/repoRelativePath"
    description: >
      Repository-relative path to the folder containing the statement package.
      The folder must contain a lakefile.lean and a lean-toolchain file.

  proofRoot:
    $ref: "#/$defs/repoRelativePath"
    description: >
      Repository-relative path to the folder containing the proof package.
      The folder must contain a lakefile.lean and a lean-toolchain file.

  abstractPath:
    $ref: "#/$defs/repoRelativePath"
    description: >
      Repository-relative path to abstract.tex. The abstract is a short
      summary of the submission's results.

  submissionTitle:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: "Human-readable submission title."

  submissionSlug:
    $ref: "#/$defs/submissionSlug"
    description: "Machine-facing slug for this submission. Lean package names are derived from this value."

  bibtex-entries:
    type: array
    description: >
      BibTeX references for papers whose results are fully or partly formalized
      in this submission.
    items:
      $ref: "#/$defs/safeText"

  statements:
    type: array
    minItems: 1
    description: >
      Entries that publish the submission's public definitions and axiom
      statements. Each entry names the public declaration, records whether it is
      a definition or axiom, points to the Lean declaration, and lists the
      declaration references used by that declaration.
    items:
      $ref: "#/$defs/statementEntry"

  proofs:
    type: array
    description: >
      Entries that record proofs for statement axioms. Each entry names the
      target statement axiom (axiom) and the proof declaration that discharges it
      (proof), both as global declaration names. The target axiom may belong to
      this submission or to another submission.
    items:
      $ref: "#/$defs/proofEntry"

  submissionIssueNumber:
    type: integer
    minimum: 1
    description: >
      Created automatically by the submit workflow. GitHub issue number for the
      issue used to manage this submission.

  submissionIssueUrl:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    format: uri
    description: >
      Created automatically by the submit workflow. URL of the GitHub issue used
      to manage this submission.

  githubRepo:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    format: uri
    minLength: 1
    description: "Created automatically by tooling/workflows. Full repository URL."

  submittedBy:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    description: "Created automatically by the submit workflow. User who initiated the submission."

  LakeProofPackage:
    $ref: "#/$defs/repoRelativePath"
    description: "Repository-relative path to the Lake proof package folder."

  LakeStatementPackage:
    $ref: "#/$defs/repoRelativePath"
    description: "Repository-relative path to the Lake statement package folder."

$defs:
  safeText:
    type: string
    pattern: "^[\\t\\r\\n\\x20-\\x7E]*$"
    not:
      anyOf:
        - pattern: "`"
        - pattern: "\\$\\("
        - pattern: "\\$\\{"
        - pattern: ";"
        - pattern: "&&"
        - pattern: "\\|\\|"
        - pattern: "[<>]"
    description: >
      Plain ASCII text accepted by the metadata checkers. Rejects suspicious
      shell tokens such as backticks, command substitutions, shell separators,
      and angle brackets.

  repoRelativePath:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^(?!/)(?!.*(?:^|/)\\.\\.(?:/|$)).+$"
    description: "Relative path that must stay inside the repository root."

  leanName:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    pattern: "^[A-Za-z_][A-Za-z0-9_']*(\\.[A-Za-z_][A-Za-z0-9_']*)*$"

  submissionSlug:
    allOf:
      - $ref: "#/$defs/safeText"
    type: string
    minLength: 1
    pattern: "^[A-Za-z][A-Za-z0-9-]*$"

  statementEntry:
    type: object
    description: >
      Statement entry. Required fields are Name, Type, and Statement.
      DeclarationReferences is optional.
    additionalProperties: false
    required:
      - Name
      - Type
      - Statement
    properties:
      Name:
        allOf:
          - $ref: "#/$defs/safeText"
        type: string
        minLength: 1
        description: "Metadata entry name for this public declaration."
      Type:
        type: string
        enum:
          - Definition
          - Axiom
        description: "Statement entry kind."
      Statement:
        $ref: "#/$defs/declarationReference"
      DeclarationReferences:
        type: array
        items:
          $ref: "#/$defs/declarationReference"

  proofEntry:
    type: object
    description: >
      Proof entry. Required fields are axiom and proof. Both are global Lean
      declaration names: the leading namespace segment is the submission slug in
      PascalCase, so each name identifies a declaration uniquely across all
      submissions.
    additionalProperties: false
    required:
      - axiom
      - proof
    properties:
      axiom:
        $ref: "#/$defs/leanName"
        description: >
          Global name of the statement axiom this proof discharges. It may belong
          to this submission or to another submission; either way the leading
          namespace segment is that submission's slug in PascalCase.
      proof:
        $ref: "#/$defs/leanName"
        description: >
          Global name of the proof declaration in this submission's proof
          package, for example SubmissionSlug.Proof.Namespace.theorem.

  declarationReference:
    type: object
    description: >
      Reference to a declaration used by a statement or proof. Use
      CurrentSubmission for references inside this submission, or SubmissionSlug
      for references to another submission. LeanStatement and LatexDefinition
      should be in the same folder.
    $comment: >
      Standard JSON Schema cannot compare path prefixes directly. Metadata
      validation code should check that LeanStatement and LatexDefinition are in
      the same folder.
    additionalProperties: false
    required:
      - LeanStatement
      - LatexDefinition
      - Name
    oneOf:
      - required:
          - CurrentSubmission
        not:
          required:
            - SubmissionSlug
      - required:
          - SubmissionSlug
        not:
          required:
            - CurrentSubmission
    properties:
      CurrentSubmission:
        type: boolean
        const: true
        description: "True when the referenced declaration belongs to this submission."
      SubmissionSlug:
        $ref: "#/$defs/submissionSlug"
        description: "Submission slug for a referenced declaration from another submission."
      LeanStatement:
        $ref: "#/$defs/repoRelativePath"
        description: "Repository-relative path to the referenced Lean statement file."
      LatexDefinition:
        $ref: "#/$defs/repoRelativePath"
        description: "Repository-relative path to the referenced LaTeX definition file."
      Name:
        $ref: "#/$defs/leanName"
        description: "Referenced Lean declaration name."
