name: Check CLI Tarball

on:
  push:
    branches:
      - main
    paths:
      - ".cli-tooling/**"
      - ".github-actions/test/**"
      - ".github/workflows/check-cli-tarball.yml"
      - "agent-info/**"
      - "lml-env.json"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "lean-meta-library-cli.tgz"
  pull_request:
    paths:
      - ".cli-tooling/**"
      - ".github-actions/test/**"
      - ".github/workflows/check-cli-tarball.yml"
      - "agent-info/**"
      - "lml-env.json"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "lean-meta-library-cli.tgz"

jobs:
  check:
    name: Verify committed beta tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test CLI
        run: npm run smoke

      - name: Rebuild and compare beta tarball
        run: |
          mkdir -p .tarball-check
          npm pack --pack-destination .tarball-check
          cp .tarball-check/*.tgz .tarball-check/lean-meta-library-cli.tgz

          if ! cmp -s .tarball-check/lean-meta-library-cli.tgz lean-meta-library-cli.tgz; then
            echo "::error file=lean-meta-library-cli.tgz::The committed beta tarball is stale. Rebuild it from the current package contents before pushing."
            echo "Run this from the repository root:"
            echo 'tmpdir="$(mktemp -d)" && npm pack --pack-destination "$tmpdir" && cp "$tmpdir"/*.tgz lean-meta-library-cli.tgz'
            exit 1
          fi
