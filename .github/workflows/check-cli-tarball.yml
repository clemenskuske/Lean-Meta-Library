name: Update CLI Tarball

on:
  push:
    branches:
      - main
    paths:
      - ".cli-tooling/**"
      - ".github/actions/**"
      - ".github/workflows/check-cli-tarball.yml"
      - ".github/workflows/submit.yml"
      - "agent-info/**"
      - "lml-env.json"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "lean-meta-library-cli.tgz"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-cli-tarball-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Rebuild committed beta tarball
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test CLI
        run: npm run smoke

      - name: Rebuild beta tarball
        run: |
          mkdir -p .tarball-check
          npm pack --pack-destination .tarball-check
          cp .tarball-check/*.tgz lean-meta-library-cli.tgz

      - name: Commit updated tarball
        run: |
          if git diff --quiet -- lean-meta-library-cli.tgz; then
            echo "lean-meta-library-cli.tgz is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean-meta-library-cli.tgz
          git commit -m "Update beta CLI tarball"
          git push
