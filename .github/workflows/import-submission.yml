name: Import Submission

on:
  issues:
    types:
      - opened
      - labeled
      - edited
      - reopened

concurrency:
  group: submission-import
  cancel-in-progress: false

jobs:
  check:
    name: Check submitted package
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    outputs:
      repo-url: ${{ steps.issue.outputs.repo-url }}
      source-branch: ${{ steps.issue.outputs.source-branch }}
      source-commit: ${{ steps.issue.outputs.source-commit }}
      manifest-path: ${{ steps.issue.outputs.manifest-path }}
      submitter-id: ${{ steps.issue.outputs.submitter-id }}
      submitter-login: ${{ steps.issue.outputs.submitter-login }}

    steps:
      - name: Checkout Lean Meta Library
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Lean
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/elan" default "$(node -e 'const env = require("./lml-env.json"); console.log(`leanprover/lean4:${env.lean.version}`)')"

      - name: Read submission issue
        id: issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");

          const body = process.env.ISSUE_BODY ?? "";
          const lmlEnv = JSON.parse(readFileSync("lml-env.json", "utf8"));
          const defaultManifestPath = lmlEnv.submission?.defaultManifestPath ?? "manifest.yaml";
          const fields = readFields(body);
          const repoUrl = fields["Repo Url"] ?? fields["Git Repo"];
          const sourceBranch = fields["Source Branch"];
          const sourceCommit = fields["Source Commit"];
          const manifestPath = fields["Manifest File"] ?? defaultManifestPath;
          const submitterId = fields["Submitter Id"] ?? "";
          const submitterLogin = normalizeLogin(fields["Submitted By"] ?? fields["Submitter Login"] ?? "");

          requireValue("Repo Url", repoUrl);
          requireValue("Source Branch", sourceBranch);
          requireValue("Source Commit", sourceCommit);

          if (!/^https:\/\/github\.com\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+(?:\.git)?$/.test(repoUrl)) {
            throw new Error(`Unsupported repository URL: ${repoUrl}`);
          }
          if (!/^[A-Za-z0-9._/-]+$/.test(sourceBranch) || sourceBranch.includes("..")) {
            throw new Error(`Unsupported source branch: ${sourceBranch}`);
          }
          if (!/^[0-9a-fA-F]{40}$/.test(sourceCommit)) {
            throw new Error(`Source Commit must be a full 40-character SHA: ${sourceCommit}`);
          }
          if (manifestPath.startsWith("/") || manifestPath.split("/").includes("..")) {
            throw new Error(`manifest path must be relative to the submitted repository: ${manifestPath}`);
          }

          appendOutput("repo-url", repoUrl);
          appendOutput("source-branch", sourceBranch);
          appendOutput("source-commit", sourceCommit);
          appendOutput("manifest-path", manifestPath);
          appendOutput("submitter-id", submitterId);
          appendOutput("submitter-login", submitterLogin);

          function readFields(text) {
            const values = {};
            for (const line of text.split(/\r?\n/)) {
              const match = line.match(/^\s*-?\s*([^:]+):\s*(.*?)\s*$/);
              if (match) {
                values[match[1].trim()] = match[2].trim();
              }
            }
            return values;
          }

          function requireValue(name, value) {
            if (!value) {
              throw new Error(`Submission issue is missing ${name}.`);
            }
          }

          function normalizeLogin(value) {
            return String(value ?? "").trim().replace(/^@/, "");
          }

          function appendOutput(name, value) {
            writeFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`, { flag: "a" });
          }
          NODE

      - name: "Comment progress: submission issue read"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 1
          TOTAL_STEPS: 10
          STEP_NAME: Submission issue was parsed
          NEXT_STEP: Checkout the submitted repository
          STEP_DETAILS: |
            Repository: ${{ steps.issue.outputs.repo-url }}
            Branch: ${{ steps.issue.outputs.source-branch }}
            Commit: ${{ steps.issue.outputs.source-commit }}
            manifest file: ${{ steps.issue.outputs.manifest-path }}
            Submitted by: ${{ steps.issue.outputs.submitter-login || github.event.issue.user.login }}
        run: node .github/actions/import-progress-comment.mjs

      - name: Checkout submitted repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ steps.issue.outputs.repo-url }}
          SOURCE_BRANCH: ${{ steps.issue.outputs.source-branch }}
          SOURCE_COMMIT: ${{ steps.issue.outputs.source-commit }}
        run: |
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH_HEADER" \
            clone --single-branch --branch "$SOURCE_BRANCH" "$REPO_URL" submission
          cd submission
          git -c http.https://github.com/.extraheader="AUTHORIZATION: basic $AUTH_HEADER" \
            fetch --depth=1 origin "$SOURCE_COMMIT"
          git checkout --detach "$SOURCE_COMMIT"
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"

      - name: Normalize workflow-created manifest fields
        env:
          MANIFEST_PATH: ${{ steps.issue.outputs.manifest-path }}
          REPO_URL: ${{ steps.issue.outputs.repo-url }}
          SOURCE_COMMIT: ${{ steps.issue.outputs.source-commit }}
          SUBMITTER_LOGIN: ${{ steps.issue.outputs.submitter-login || github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          node "$GITHUB_WORKSPACE/.github/actions/normalize-submission-manifest.mjs" "$GITHUB_WORKSPACE/submission/$MANIFEST_PATH"

      - name: "Comment progress: repository checked out"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 2
          TOTAL_STEPS: 10
          STEP_NAME: Submitted repository was checked out at the requested commit
          NEXT_STEP: Prepare the Lean build/cache
          STEP_DETAILS: |
            Checked out commit: ${{ steps.issue.outputs.source-commit }}
        run: node .github/actions/import-progress-comment.mjs

      - name: Prepare Lean build/cache
        env:
          MANIFEST_PATH: ${{ steps.issue.outputs.manifest-path }}
          LML_CHECK_RUN_ID: import-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          node "$GITHUB_WORKSPACE/.github/actions/test/statements/prepare-build-cache.mjs" "$GITHUB_WORKSPACE/submission/$MANIFEST_PATH"
          node "$GITHUB_WORKSPACE/.github/actions/test/proofs/prepare-build-cache.mjs" "$GITHUB_WORKSPACE/submission/$MANIFEST_PATH"

      - name: "Comment progress: build/cache prepared"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 3
          TOTAL_STEPS: 10
          STEP_NAME: Lean build/cache preparation completed
          NEXT_STEP: Run first-run submission checks
        run: node .github/actions/import-progress-comment.mjs

      - name: Run submission checks
        env:
          MANIFEST_PATH: ${{ steps.issue.outputs.manifest-path }}
          LML_CHECK_RUN_ID: import-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          node "$GITHUB_WORKSPACE/.github/actions/test/run-all.mjs" --skip-build-cache "$GITHUB_WORKSPACE/submission/$MANIFEST_PATH"

      - name: "Comment progress: submission checks passed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 4
          TOTAL_STEPS: 10
          STEP_NAME: First-run submission checks passed
          NEXT_STEP: Run the final proof build
        run: node .github/actions/import-progress-comment.mjs

      - name: Run final proof build
        env:
          MANIFEST_PATH: ${{ steps.issue.outputs.manifest-path }}
        run: |
          node "$GITHUB_WORKSPACE/.github/actions/test/final-proof-build.mjs" "$GITHUB_WORKSPACE/submission/$MANIFEST_PATH"

      - name: "Comment progress: final proof build passed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 5
          TOTAL_STEPS: 10
          STEP_NAME: Final proof build passed
          NEXT_STEP: Upload the checked manifest artifact
        run: node .github/actions/import-progress-comment.mjs

      - name: Stage checked manifest
        env:
          MANIFEST_PATH: ${{ steps.issue.outputs.manifest-path }}
        run: |
          mkdir -p checked-manifest
          node .github/actions/create-submission/create-output-config.mjs \
            --manifest="submission/$MANIFEST_PATH" \
            --output=checked-manifest/manifest.yaml

      - name: Upload checked manifest
        uses: actions/upload-artifact@v4
        with:
          name: checked-submission-manifest
          path: checked-manifest/manifest.yaml
          if-no-files-found: error

      - name: "Comment progress: checked manifest uploaded"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 6
          TOTAL_STEPS: 10
          STEP_NAME: Checked manifest artifact was uploaded
          NEXT_STEP: Download the checked manifest artifact in the import job
        run: node .github/actions/import-progress-comment.mjs

  import:
    name: Import submission manifest
    needs: check
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout Lean Meta Library
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install Node dependencies
        run: npm ci

      - name: Download checked manifest
        uses: actions/download-artifact@v4
        with:
          name: checked-submission-manifest
          path: checked-submission

      - name: "Comment progress: checked manifest downloaded"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 7
          TOTAL_STEPS: 10
          STEP_NAME: Checked manifest artifact was downloaded
          NEXT_STEP: Update submissions.jsonl
        run: node .github/actions/import-progress-comment.mjs

      - name: Update submissions log
        env:
          REPO_URL: ${{ needs.check.outputs.repo-url }}
          SOURCE_BRANCH: ${{ needs.check.outputs.source-branch }}
          SOURCE_COMMIT: ${{ needs.check.outputs.source-commit }}
          MANIFEST_PATH: ${{ needs.check.outputs.manifest-path }}
          SUBMITTER_ID: ${{ needs.check.outputs.submitter-id }}
          SUBMITTER_LOGIN: ${{ needs.check.outputs.submitter-login }}
          ISSUE_ID: ${{ github.event.issue.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_USER_ID: ${{ github.event.issue.user.id }}
          ISSUE_USER_LOGIN: ${{ github.event.issue.user.login }}
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync, writeFileSync } from "node:fs";
          import { assertSubmissionRow } from "./.github/actions/submission-schema.mjs";
          import YAML from "yaml";

          const checkedManifestPath = "checked-submission/manifest.yaml";
          if (!existsSync(checkedManifestPath)) {
            throw new Error(`Checked manifest artifact not found: ${checkedManifestPath}`);
          }

          const manifest = YAML.parse(readFileSync(checkedManifestPath, "utf8")) ?? {};
          const repoUrl = process.env.REPO_URL;
          const sourceCommit = String(process.env.SOURCE_COMMIT ?? "").toLowerCase();
          const sourceManifestPath = process.env.MANIFEST_PATH;
          const submitterId = String(process.env.SUBMITTER_ID || process.env.ISSUE_USER_ID || "");
          const submitterLogin = process.env.SUBMITTER_LOGIN || process.env.ISSUE_USER_LOGIN;
          const row = submissionRecord({
            manifest,
            repoUrl,
            sourceCommit,
            sourceManifestPath,
            submitterId,
            submitterLogin,
            issueNumber: Number(process.env.ISSUE_NUMBER),
            issueUrl: process.env.ISSUE_URL
          });
          assertSubmissionRow(row, "new submissions.jsonl row");

          const logPath = "submissions.jsonl";
          const existingText = existsSync(logPath) ? readFileSync(logPath, "utf8") : "";
          const rows = existingText
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean)
            .map((line, index) => parseJsonLine(line, index + 1));
          rows.forEach((existingRow, index) => assertSubmissionRow(existingRow, `${logPath}:${index + 1}`));

          const index = rows.findIndex((candidate) => isSameSubmission(candidate, row));
          if (index >= 0) {
            rows[index] = row;
          } else {
            rows.push(row);
          }

          const nextLogText = rows.map((item) => JSON.stringify(item)).join("\n") + "\n";
          writeFileSync(logPath, nextLogText);
          writeFileSync(".website/submissions-data.js", websiteDataSource(nextLogText));

          function parseJsonLine(line, lineNumber) {
            try {
              return JSON.parse(line);
            } catch (error) {
              throw new Error(`${logPath}:${lineNumber} is not valid JSON: ${error.message}`);
            }
          }

          function isSameSubmission(left, right) {
            const leftData = left.SubmissionData ?? {};
            const rightData = right.SubmissionData ?? {};
            return (
              leftData.submissionIssueNumber === rightData.submissionIssueNumber ||
              (
                normalize(leftData.Repo ?? left["Repo Url"] ?? left["Git Repo"]) === normalize(rightData.Repo ?? right["Repo Url"] ?? right["Git Repo"]) &&
                (leftData.ManifestPath ?? left["Manifest File"]) === (rightData.ManifestPath ?? right["Manifest File"])
              )
            );
          }

          function submissionRecord({ manifest, repoUrl, sourceCommit, sourceManifestPath, submitterId, submitterLogin, issueNumber, issueUrl }) {
            const submissionData = copyDefined({
              SubmissionSlug: manifest.SubmissionSlug,
              SubmissionName: manifest.SubmissionName,
              AbstractPath: manifest.AbstractPath,
              BibEntries: manifest.BibEntries ?? [],
              LicenseFile: manifest.LicenseFile,
              ManifestPath: sourceManifestPath,
              SubmissionUserId: submitterId,
              Repo: repoUrl,
              Commit: sourceCommit,
              manifestVersion: manifest.manifestVersion,
              leanVersion: manifest.leanVersion,
              mathlibVersion: manifest.mathlibVersion,
              submittedBy: submitterLogin,
              submissionIssueNumber: issueNumber,
              submissionIssueUrl: issueUrl
            });

            return copyDefined({
              SubmissionData: submissionData,
              StatementSubmissions: manifest.StatementSubmissions,
              ProofSubmissions: manifest.ProofSubmissions
            });
          }

          function copyDefined(value) {
            return Object.fromEntries(
              Object.entries(value).filter(([, item]) => item !== undefined && item !== null && item !== "")
            );
          }

          function normalize(value) {
            return String(value ?? "").trim().replace(/\.git$/i, "").replace(/\/$/g, "");
          }

          function websiteDataSource(jsonl) {
            return [
              "// Generated snapshot for opening .website/index.html directly from the filesystem.",
              "// The import workflow keeps this value synchronized with submissions.jsonl.",
              "window.LML_SUBMISSIONS_DATA_SOURCE = \"./submissions-data.js\";",
              `window.LML_SUBMISSIONS_JSONL = ${JSON.stringify(jsonl)};`,
              ""
            ].join("\n");
          }
          NODE

      - name: "Comment progress: submissions log updated"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 8
          TOTAL_STEPS: 10
          STEP_NAME: submissions.jsonl was updated locally
          NEXT_STEP: Commit and push submissions.jsonl if it changed
        run: node .github/actions/import-progress-comment.mjs

      - name: Commit submissions log
        run: |
          if git diff --quiet -- submissions.jsonl .website/submissions-data.js; then
            echo "submissions.jsonl and website data snapshot already contain this submission."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add submissions.jsonl .website/submissions-data.js
          git commit -m "Import submission manifest"
          git push origin HEAD:"$GITHUB_REF_NAME"

      - name: "Comment progress: submissions log committed"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 9
          TOTAL_STEPS: 10
          STEP_NAME: submissions.jsonl commit step completed
          NEXT_STEP: Close the imported issue
          STEP_DETAILS: |
            If submissions.jsonl already contained this submission, no commit was needed.
        run: node .github/actions/import-progress-comment.mjs

      - name: Close imported issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STEP_NUMBER: 10
          TOTAL_STEPS: 10
          STEP_NAME: Imported issue was closed
        run: |
          node <<'NODE'
          const { writeFileSync } = require("node:fs");

          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const issueNumber = process.env.ISSUE_NUMBER;
          const apiBase = "https://api.github.com";

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });

          async function main() {
            await github("PATCH", `/repos/${repository}/issues/${issueNumber}`, {
              state: "closed",
              state_reason: "completed"
            });

            if (process.env.GITHUB_STEP_SUMMARY) {
              writeFileSync(process.env.GITHUB_STEP_SUMMARY, `Imported and closed issue #${issueNumber}.\n`, {
                flag: "a"
              });
            }
          }

          async function github(method, path, body) {
            const response = await fetch(`${apiBase}${path}`, {
              method,
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                "X-GitHub-Api-Version": "2022-11-28"
              },
              body: body ? JSON.stringify(body) : undefined
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${method} ${path} failed with ${response.status}: ${text}`);
            }

            return response.json();
          }
          NODE
          node .github/actions/import-progress-comment.mjs
