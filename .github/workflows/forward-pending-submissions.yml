name: Forward Pending Submissions

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: forward-pending-submissions
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  forward:
    name: Forward pending submissions from source repos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lean Meta Library
        uses: actions/checkout@v4

      - name: Forward pending submissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node --input-type=module <<'NODE'
          import { existsSync, readFileSync } from "node:fs";

          const token = process.env.GITHUB_TOKEN;
          const [libOwner, libRepo] = process.env.GITHUB_REPOSITORY.split("/");
          const apiBase = "https://api.github.com";

          main().catch(err => { console.error(err.message); process.exit(1); });

          async function main() {
            const sourcesPath = "submission-sources.json";
            if (!existsSync(sourcesPath)) {
              console.log("No submission-sources.json found; nothing to forward.");
              return;
            }

            const sources = JSON.parse(readFileSync(sourcesPath, "utf8"));
            if (!Array.isArray(sources) || sources.length === 0) {
              console.log("submission-sources.json is empty; nothing to forward.");
              return;
            }

            const importedCommits = getImportedCommits();
            console.log(`Imported commits in submissions.jsonl: ${importedCommits.size}`);

            const libIssues = await paginate(`/repos/${libOwner}/${libRepo}/issues`, { labels: "submission", state: "open" });
            const inProgressCommits = new Set(
              libIssues.map(i => extractField(i.body, "Source Commit")?.toLowerCase()).filter(Boolean)
            );
            console.log(`In-progress commits (open issues): ${inProgressCommits.size}`);

            for (const sourceRepo of sources) {
              console.log(`\nChecking source repo: ${sourceRepo}`);
              try {
                await processSourceRepo(sourceRepo, importedCommits, inProgressCommits);
              } catch (err) {
                console.error(`Error processing ${sourceRepo}: ${err.message}`);
              }
            }
          }

          function getImportedCommits() {
            const logPath = "submissions.jsonl";
            if (!existsSync(logPath)) return new Set();
            return new Set(
              readFileSync(logPath, "utf8")
                .split("\n")
                .filter(Boolean)
                .map(line => { try { return JSON.parse(line); } catch { return null; } })
                .filter(Boolean)
                .map(row => row.SubmissionData?.Commit?.toLowerCase())
                .filter(Boolean)
            );
          }

          async function processSourceRepo(sourceRepo, importedCommits, inProgressCommits) {
            const issues = await paginate(`/repos/${sourceRepo}/issues`, { labels: "submission", state: "open" }, { noAuth: true });
            console.log(`  Found ${issues.length} open submission issue(s)`);

            for (const issue of issues) {
              const sourceCommit = extractField(issue.body, "Source Commit")?.toLowerCase();
              if (!sourceCommit) {
                console.log(`  Skipping #${issue.number}: no Source Commit field`);
                continue;
              }

              if (importedCommits.has(sourceCommit)) {
                console.log(`  Skipping #${issue.number}: commit ${sourceCommit.slice(0, 7)} already imported`);
                continue;
              }

              if (inProgressCommits.has(sourceCommit)) {
                console.log(`  Skipping #${issue.number}: commit ${sourceCommit.slice(0, 7)} already in progress`);
                continue;
              }

              console.log(`  Forwarding #${issue.number}: ${issue.title} (commit ${sourceCommit.slice(0, 7)})`);
              await ensureLabel(libOwner, libRepo, "submission");
              await github("POST", `/repos/${libOwner}/${libRepo}/issues`, {
                title: issue.title,
                body: issue.body,
                labels: ["submission"]
              });
              inProgressCommits.add(sourceCommit);
              console.log(`  Forwarded successfully`);
            }
          }

          function extractField(body, fieldName) {
            const escaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            for (const line of (body ?? "").split(/\r?\n/)) {
              const m = line.match(new RegExp(`^\\s*-?\\s*${escaped}:\\s*(.*?)\\s*$`));
              if (m) return m[1].trim();
            }
            return null;
          }

          async function ensureLabel(owner, repo, name) {
            const existing = await github("GET", `/repos/${owner}/${repo}/labels/${encodeURIComponent(name)}`, null, { allowNotFound: true });
            if (!existing) {
              await github("POST", `/repos/${owner}/${repo}/labels`, {
                name,
                color: "0E8A16",
                description: "Lean Meta Library submission"
              });
            }
          }

          async function paginate(path, params = {}, opts = {}) {
            const items = [];
            for (let page = 1; ; page++) {
              const query = new URLSearchParams({ ...params, per_page: "100", page: String(page) }).toString();
              const batch = await github("GET", `${path}?${query}`, null, opts);
              if (!Array.isArray(batch)) break;
              items.push(...batch);
              if (batch.length < 100) break;
            }
            return items;
          }

          async function github(method, path, body, opts = {}) {
            const headers = {
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2022-11-28"
            };
            if (!opts.noAuth) {
              headers.Authorization = `Bearer ${token}`;
            }
            const response = await fetch(`${apiBase}${path}`, {
              method,
              headers,
              body: body ? JSON.stringify(body) : undefined
            });
            if (opts.allowNotFound && response.status === 404) return null;
            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${method} ${path} → ${response.status}: ${text}`);
            }
            return response.json();
          }
          NODE
