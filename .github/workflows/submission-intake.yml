name: Submission Intake

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  label:
    name: Validate and label submission issue
    if: >-
      ${{
        !contains(github.event.issue.labels.*.name, 'submission') &&
        contains(github.event.issue.body, '<!-- lean-meta-library:submission -->')
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lean Meta Library
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Validate submission issue
        id: issue
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node .github/actions/read-submission-issue.mjs

      - name: Add submission label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          node <<'NODE'
          const token = process.env.GITHUB_TOKEN;
          const repository = process.env.GITHUB_REPOSITORY;
          const issueNumber = process.env.ISSUE_NUMBER;
          const apiBase = "https://api.github.com";

          main().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });

          async function main() {
            await github("POST", `/repos/${repository}/issues/${issueNumber}/labels`, {
              labels: ["submission"]
            });
          }

          async function github(method, path, body) {
            const response = await fetch(`${apiBase}${path}`, {
              method,
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                "X-GitHub-Api-Version": "2022-11-28"
              },
              body: body ? JSON.stringify(body) : undefined
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${method} ${path} failed with ${response.status}: ${text}`);
            }

            return response.json();
          }
          NODE

      - name: Comment on invalid submission issue
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node .github/actions/submission-intake-failure-comment.mjs
